<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Signup</title>

<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'SF Pro Display', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#ff7e00,#ff3d00);
overflow:hidden;
}

/* LIGHT BLOBS */
.blob{
position:absolute;
width:400px;
height:400px;
background:radial-gradient(circle,#ffffff55,#ff3d00);
filter:blur(80px);
animation:move 12s infinite alternate ease-in-out;
}

.blob:nth-child(1){ top:-100px; left:-100px;}
.blob:nth-child(2){ bottom:-100px; right:-100px;}

@keyframes move{
0%{transform:translate(0,0);}
100%{transform:translate(80px,60px);}
}

/* GLASS CARD */
.container{
width:920px;
height:540px;
border-radius:40px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(30px);
display:flex;
box-shadow:0 30px 80px rgba(0,0,0,0.5);
overflow:hidden;
}

/* LEFT */
.left{
width:45%;
background:linear-gradient(160deg,#ff7e00,#ff3d00);
padding:50px;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
position:relative;
}

.left h1{
font-size:48px;
font-weight:700;
letter-spacing:2px;
}

.left p{
margin-top:20px;
opacity:.8;
}

/* FLOATING SHAPE */
.shape{
position:absolute;
width:300px;
height:300px;
background:radial-gradient(circle,#ffffff55,#ff3d00);
border-radius:50%;
top:-80px;
left:-80px;
animation:rotate 20s linear infinite;
}

@keyframes rotate{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* RIGHT */
.right{
width:55%;
padding:50px;
display:flex;
flex-direction:column;
justify-content:center;
color:white;
}

/* TAB */
.tabs{
display:flex;
justify-content:space-between;
margin-bottom:30px;
font-weight:500;
}

.tabs span{
cursor:pointer;
opacity:.6;
}

.tabs span.active{
opacity:1;
border-bottom:2px solid white;
}

/* INPUT */
.input-box{
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:14px 20px;
border-radius:30px;
border:none;
background:rgba(255,255,255,0.15);
color:white;
outline:none;
backdrop-filter:blur(10px);
transition:.3s;
}

.input-box input:focus{
background:rgba(255,255,255,0.25);
}

/* BUTTON */
.btn{
margin-top:20px;
padding:14px;
border:none;
border-radius:30px;
background:white;
color:#ff3d00;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 10px 30px rgba(255,255,255,0.4);
}

/* CHECK */
.check{
font-size:12px;
margin-top:10px;
display:flex;
gap:10px;
}

/* RESPONSIVE */
@media(max-width:768px){
.container{
flex-direction:column;
height:auto;
}
.left,.right{
width:100%;
}
}

</style>
</head>

<body>

<div class="blob"></div>
<div class="blob"></div>

<div class="container">

<div class="left">
<div class="shape"></div>
<h1>SIGN UP</h1>
<p>Experience premium cinematic UI design.</p>
</div>

<div class="right">

<div class="tabs">
<span class="active">sign up</span>
<span>login</span>
</div>

<div class="input-box">
<input type="text" placeholder="name">
</div>

<div class="input-box">
<input type="text" placeholder="login">
</div>

<div class="input-box">
<input type="email" placeholder="e-mail">
</div>

<div class="input-box">
<input type="password" placeholder="password">
</div>

<div class="check">
<input type="checkbox"> I accept terms
</div>

<button class="btn">sign up →</button>

</div>

</div>

</body>
</html>here
<script>
    const signUpBtn = document.querySelector('.btn');
    
    signUpBtn.addEventListener('click', () => {
        // ইনপুট ভ্যালুগুলো সংগ্রহ করা
        const name = document.querySelector('input[placeholder="name"]').value;
        const login = document.querySelector('input[placeholder="login"]').value;
        const email = document.querySelector('input[placeholder="e-mail"]').value;
        const password = document.querySelector('input[placeholder="password"]').value;
        const terms = document.querySelector('input[type="checkbox"]').checked;

        if(!name || !email || !password) {
            alert("দয়া করে সব ঘর পূরণ করুন! ❌");
            return;
        }

        if(!terms) {
            alert("আমাদের শর্তাবলীতে টিক দিন! 📜");
            return;
        }

        // একটি অবজেক্ট তৈরি করা
        const userData = {
            name: name,
            login: login,
            email: email,
            password: password
        };

        // লোকাল স্টোরেজে সেভ করা
        localStorage.setItem('userAccount', JSON.stringify(userData));

        // প্রিমিয়াম ফিডব্যাক
        signUpBtn.innerHTML = "Processing...";
        signUpBtn.style.opacity = "0.7";

        setTimeout(() => {
            alert(`অভিনন্দন ${name}! আপনার অ্যাকাউন্ট তৈরি হয়েছে। 🎉`);
            signUpBtn.innerHTML = "sign up →";
            signUpBtn.style.opacity = "1";
            
            // কনসোলে চেক করার জন্য
            console.log("Saved Data:", JSON.parse(localStorage.getItem('userAccount')));
        }, 1500);
    });
</script>
