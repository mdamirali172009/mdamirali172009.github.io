<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Amir — Freelance Web Developer & Digital Consultant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    body { font-family: 'Manrope', sans-serif; }
    h1, h2, h3 { font-family: 'Outfit', sans-serif; }
    .teal { color: #00BFA5; }
    .hero-bg { background: linear-gradient(135deg, #0A192F 0%, #112240 100%); }
  </style>
</head>
<body class="bg-gray-950 text-white">

  <!-- Navbar -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-lg border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-[#00BFA5] text-black font-black text-2xl flex items-center justify-center rounded-xl">A</div>
        <span class="text-2xl font-bold">Amir</span>
      </div>
      <button onclick="showRegisterModal()" class="bg-[#00BFA5] text-black px-6 py-2.5 rounded-full font-bold hover:scale-105 transition">
        Register Now
      </button>
    </div>
  </nav>

  <!-- Hero -->
  <section id="home" class="min-h-screen hero-bg flex items-center pt-20">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h1 class="text-6xl md:text-7xl font-black leading-tight">Hello, I'm <span class="text-[#00BFA5]">Amir</span></h1>
      <p class="text-2xl mt-4 text-gray-300">Freelance Web Developer & Digital Consultant</p>
      <p class="mt-6 text-gray-400 max-w-lg mx-auto">Savar, Dhaka, Bangladesh</p>
      <button onclick="showRegisterModal()" class="mt-10 bg-[#00BFA5] text-black px-10 py-4 rounded-full text-lg font-bold hover:scale-105 transition">
        Get In Touch / Register
      </button>
    </div>
  </section>

  <!-- Registration Modal -->
  <div id="registerModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
    <div class="bg-gray-900 rounded-3xl p-8 max-w-md w-full mx-4">
      <h2 class="text-3xl font-bold text-center mb-6">Create Your Profile</h2>
      
      <form id="registerForm" class="space-y-5">
        <input type="text" id="regName" placeholder="Full Name" required class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 focus:border-[#00BFA5] outline-none">
        <input type="email" id="regEmail" placeholder="Email Address" required class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 focus:border-[#00BFA5] outline-none">
        <input type="tel" id="regPhone" value="01840364137" placeholder="Phone Number" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 focus:border-[#00BFA5] outline-none">
        
        <button type="submit" class="w-full bg-[#00BFA5] text-black font-bold py-4 rounded-2xl text-lg hover:bg-[#00a38f] transition">
          Register
        </button>
      </form>
      
      <button onclick="closeModal()" class="mt-4 w-full text-gray-400 hover:text-white">Cancel</button>
    </div>
  </div>

  <!-- Success Match Modal -->
  <div id="matchModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[200]">
    <div class="bg-gray-900 rounded-3xl p-10 max-w-lg w-full text-center">
      <div class="text-6xl mb-6">🎉</div>
      <h2 class="text-4xl font-bold text-[#00BFA5] mb-4">Match Found!</h2>
      <p class="text-xl text-gray-300 mb-8">Congratulations! You have been successfully registered.</p>
      
      <div class="bg-gray-800 rounded-2xl p-6 mb-8">
        <p class="text-[#00BFA5] font-medium">Amir has received your registration</p>
        <p class="text-sm text-gray-400 mt-2">He will contact you soon via WhatsApp or Email.</p>
      </div>
      
      <button onclick="closeMatchModal()" class="bg-[#00BFA5] text-black px-10 py-4 rounded-full font-bold">
        Done
      </button>
    </div>
  </div>

  <script>
    // Show Registration Modal
    function showRegisterModal() {
      document.getElementById('registerModal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('registerModal').classList.add('hidden');
    }

    function closeMatchModal() {
      document.getElementById('matchModal').classList.add('hidden');
    }

    // Form Submit
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const name = document.getElementById('regName').value;
      
      // Hide register modal
      closeModal();
      
      // Show success match modal after 500ms
      setTimeout(() => {
        document.getElementById('matchModal').classList.remove('hidden');
        
        // Simulate sending data to you (Amir)
        console.log("=== NEW REGISTRATION RECEIVED ===");
        console.log("Name:", name);
        console.log("Phone: 01840364137");
        console.log("Time:", new Date().toLocaleString());
      }, 600);
    });

    // Close modals if clicked outside
    document.getElementById('registerModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.getElementById('matchModal').addEventListener('click', function(e) {
      if (e.target === this) closeMatchModal();
    });
  </script>
</body>
</html>
