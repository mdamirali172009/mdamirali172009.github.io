<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff7e00,#ff3d00);
}

/* MAIN CARD */
.container{
width:900px;
height:520px;
background:#fff;
border-radius:30px;
display:flex;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

/* LEFT SIDE */
.left{
width:45%;
background:linear-gradient(135deg,#ff7e00,#ff3d00);
color:#fff;
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
}

.left h1{
font-size:40px;
margin-bottom:20px;
}

.left p{
font-size:14px;
opacity:.8;
}

/* RIGHT SIDE */
.right{
width:55%;
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
}

/* TAB */
.tabs{
display:flex;
justify-content:space-between;
margin-bottom:30px;
font-weight:500;
}

.tabs span{
cursor:pointer;
position:relative;
}

.tabs span.active::after{
content:'';
position:absolute;
bottom:-5px;
left:0;
width:100%;
height:3px;
background:#ff7e00;
border-radius:10px;
}

/* INPUT */
.input-box{
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:12px 20px;
border-radius:30px;
border:1px solid #ddd;
outline:none;
}

/* BUTTON */
.btn{
margin-top:20px;
padding:12px;
border:none;
border-radius:30px;
background:#ff3d00;
color:#fff;
cursor:pointer;
font-weight:600;
transition:.3s;
}

.btn:hover{
background:#ff1e00;
}

/* CHECK */
.check{
display:flex;
align-items:center;
gap:10px;
font-size:12px;
margin-top:10px;
}

/* RESPONSIVE */
@media(max-width:768px){
.container{
flex-direction:column;
height:auto;
}
.left,.right{
width:100%;
}
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
<h1>SIGN UP</h1>
<p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor.</p>
</div>

<!-- RIGHT -->
<div class="right">

<div class="tabs">
<span class="active">sign up</span>
<span>login</span>
</div>

<div class="input-box">
<input type="text" placeholder="name">
</div>

<div class="input-box">
<input type="text" placeholder="login">
</div>

<div class="input-box">
<input type="email" placeholder="e-mail">
</div>

<div class="input-box">
<input type="password" placeholder="password">
</div>

<div class="check">
<input type="checkbox"> I have accepted the terms and conditions
</div>

<button class="btn">sign up →</button>

</div>

</div>

</body>
</html>
