<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>কঠিন Spot the Difference</title>
  <style>
    body { font-family: Arial; text-align: center; background: #111; color: #fff; }
    .container { display: flex; justify-content: center; gap: 20px; margin: 20px; }
    img { width: 450px; border: 3px solid #fff; cursor: crosshair; }
    .found { position: absolute; width: 30px; height: 30px; border: 3px solid red; border-radius: 50%; pointer-events: none; }
    h1 { color: #0f0; }
  </style>
</head>
<body>
  <h1>খুব কঠিন Spot the Difference</h1>
  <p>দুই ছবিতে ক্লিক করে ৮টা difference খুঁজে বের করো (ছোট ছোট জিনিস দেখো)</p>
  
  <div class="container">
    <div style="position: relative;">
      <img id="left" src="https://picsum.photos/id/1015/800/600" alt="Left Image">
    </div>
    <div style="position: relative;">
      <img id="right" src="https://picsum.photos/id/1016/800/600" alt="Right Image">
    </div>
  </div>

  <p>পাওয়া: <span id="count">0</span>/8</p>

  <script>
    let count = 0;
    const max = 8;
    const rightImg = document.getElementById('right');

    // এখানে কয়েকটা approximate difference এরিয়া দিলাম (তুমি চাইলে পরিবর্তন করতে পারো)
    const differences = [
      {x: 150, y: 200, r: 25},
      {x: 320, y: 120, r: 20},
      {x: 450, y: 300, r: 30},
      {x: 180, y: 420, r: 18},
      {x: 550, y: 180, r: 25},
      {x: 280, y: 350, r: 22},
      {x: 600, y: 450, r: 20},
      {x: 100, y: 280, r: 28}
    ];

    rightImg.addEventListener('click', function(e) {
      const rect = rightImg.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;

      for (let diff of differences) {
        const dist = Math.sqrt(Math.pow(clickX - diff.x, 2) + Math.pow(clickY - diff.y, 2));
        if (dist < diff.r && !diff.found) {
          diff.found = true;
          count++;
          document.getElementById('count').textContent = count;

          // লাল সার্কেল দেখানো
          const mark = document.createElement('div');
          mark.className = 'found';
          mark.style.left = (clickX - 15) + 'px';
          mark.style.top = (clickY - 15) + 'px';
          rightImg.parentElement.appendChild(mark);

          if (count === max) {
            alert("🎉 অসাধারণ! সবগুলো difference খুঁজে পেয়েছ!");
          }
          break;
        }
      }
    });
  </script>
</body>
</html>
