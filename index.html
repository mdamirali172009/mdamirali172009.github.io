<!DOCTYPE html>
<html lang="bn" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayDesh - Premium Payment App</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap');
  body { font-family: 'Hind Siliguri', sans-serif; }
 .glass {
    background: rgba(18, 24, 22, 0.6);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }
 .gradient-bg {
    background: linear-gradient(135deg, #00C853 0%, #00B0FF 100%);
  }
 .screen { display: none; }
 .screen.active { display: block; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body class="bg-[#0A0F0D] text-white">
<div class="max-w-[420px] mx-auto min-h-screen relative overflow-hidden">

  <!-- Splash Screen -->
  <div id="splash" class="screen active fixed inset-0 gradient-bg flex flex-col items-center justify-center z-50">
    <h1 class="text-5xl font-bold">PayDesh</h1>
    <p class="text-white/80 mt-2">Fast. Secure. Bangladeshi.</p>
  </div>

  <!-- Main App -->
  <div id="app" class="screen pb-24">
    <!-- Home Screen -->
    <div id="home-screen" class="screen active px-4 pt-6">
      <h2 class="text-2xl font-bold mb-4">Good Evening, Tanvir</h2>

      <!-- Balance Card -->
      <div class="gradient-bg rounded-3xl p-5 mb-6">
        <div class="flex justify-between items-center">
          <span class="text-white/80">Available Balance</span>
          <button onclick="toggleBalance()"><i data-lucide="eye-off" id="eye-icon" class="w-5 h-5"></i></button>
        </div>
        <p class="text-4xl font-bold mt-2" id="balance-text">৳ 12,847.50</p>
        <p class="text-white/70 mt-1">PayDesh Account</p>
      </div>

      <!-- Quick Actions -->
      <div class="glass rounded-3xl p-4 mb-6">
        <div class="grid grid-cols-4 gap-3">
          <button onclick="showScreen('send-screen')" class="flex flex-col items-center">
            <div class="bg-[#00C853]/20 p-3 rounded-2xl mb-2"><i data-lucide="send" class="text-[#00C853]"></i></div>
            <span class="text-xs">Send Money</span>
          </button>
          <button onclick="showScreen('qr-screen')" class="flex flex-col items-center">
            <div class="bg-[#00B0FF]/20 p-3 rounded-2xl mb-2"><i data-lucide="scan" class="text-[#00B0FF]"></i></div>
            <span class="text-xs">Scan QR</span>
          </button>
          <button class="flex flex-col items-center">
            <div class="bg-[#00C853]/20 p-3 rounded-2xl mb-2"><i data-lucide="smartphone" class="text-[#00C853]"></i></div>
            <span class="text-xs">Recharge</span>
          </button>
          <button class="flex flex-col items-center">
            <div class="bg-[#00B0FF]/20 p-3 rounded-2xl mb-2"><i data-lucide="receipt" class="text-[#00B0FF]"></i></div>
            <span class="text-xs">Bills</span>
          </button>
        </div>
      </div>

      <!-- Recent Transactions -->
      <h3 class="text-lg font-semibold mb-3">Recent Transactions</h3>
      <div class="space-y-3">
        <div class="glass rounded-2xl p-4 flex justify-between items-center">
          <div>
            <p class="font-semibold">Rahim Store</p>
            <p class="text-xs text-white/60">2026-05-09</p>
          </div>
          <p class="font-bold text-red-500">- ৳500</p>
        </div>
        <div class="glass rounded-2xl p-4 flex justify-between items-center">
          <div
