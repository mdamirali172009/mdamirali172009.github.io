<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaPlay - Gaming Hub</title>
<style>
:root {
  --primary: #0ff0fc;
  --secondary: #6c5ce7;
  --bg: #0b0f1a;
  --card: rgba(255,255,255,0.08);
  --glass: rgba(255,255,255,0.05);
}{ margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }


body { background: linear-gradient(135deg, #0b0f1a, #1a1f3c); color: white; }

header { display: flex; justify-content: space-between; padding: 20px 40px; backdrop-filter: blur(20px); background: var(--glass); }

.logo { font-size: 24px; font-weight: bold; color: var(--primary); }

nav a { margin: 0 15px; text-decoration: none; color: white; transition: 0.3s; }

nav a:hover { color: var(--primary); }

.hero { text-align: center; padding: 100px 20px; }

.hero h1 { font-size: 50px; background: linear-gradient(90deg, #0ff0fc, #6c5ce7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.upload-box { width: 90%; max-width: 500px; margin: 40px auto; padding: 20px; border-radius: 20px; background: var(--card); backdrop-filter: blur(10px); }

.upload-box input, .upload-box button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: none; }

.upload-box button { background: linear-gradient(45deg, #0ff0fc, #6c5ce7); color: black; font-weight: bold; cursor: pointer; }

.games { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; }

.card { background: var(--card); padding: 15px; border-radius: 15px; transition: 0.3s; }

.card:hover { transform: translateY(-10px); }

iframe { width: 100%; height: 200px; border-radius: 10px; }

footer { text-align: center; padding: 20px; opacity: 0.6; }

</style>
</head>
<body><header>
  <div class="logo">NovaPlay</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Games</a>
    <a href="#">Upload</a>
  </nav>
</header><section class="hero">
  <h1>Next Gen Gaming Platform</h1>
  <p>Upload & Play Games Instantly</p>
</section><div class="upload-box">
  <h2>Upload Your Game</h2>
  <input type="text" id="title" placeholder="Game Title">
  <input type="text" id="url" placeholder="Game Embed URL">
  <button onclick="addGame()">Upload Game</button>
</div><section class="games" id="gameList"></section><footer>
  © 2026 NovaPlay | Premium Gaming UI
</footer><script>
let games = [];

function addGame() {
  const title = document.getElementById('title').value;
  const url = document.getElementById('url').value;

  if (!title || !url) {
    alert('Please fill all fields');
    return;
  }

  const game = { title, url };
  games.push(game);
  renderGames();
}

function renderGames() {
  const list = document.getElementById('gameList');
  list.innerHTML = '';

  games.forEach(g => {
    list.innerHTML += `
      <div class="card">
        <h3>${g.title}</h3>
        <iframe src="${g.url}"></iframe>
      </div>
    `;
  });
}
</script></body>
</html>
