<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Signup</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff7e00,#ff3d00);
overflow:hidden;
}

/* BACKGROUND FLOATING BALLS */
.ball{
position:absolute;
border-radius:50%;
background:radial-gradient(circle at 30% 30%, #fff6, #ff3d00);
animation:float 10s infinite ease-in-out;
filter:blur(2px);
}

.ball:nth-child(1){
width:250px;
height:250px;
top:10%;
left:5%;
}

.ball:nth-child(2){
width:200px;
height:200px;
bottom:10%;
right:10%;
animation-delay:3s;
}

@keyframes float{
0%,100%{transform:translateY(0) rotate(0deg);}
50%{transform:translateY(-40px) rotate(180deg);}
}

/* GLASS CARD */
.container{
width:900px;
height:520px;
display:flex;
border-radius:30px;
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.1);
box-shadow:0 25px 60px rgba(0,0,0,0.4);
overflow:hidden;
}

/* LEFT */
.left{
width:45%;
background:linear-gradient(135deg,#ff7e00,#ff3d00);
display:flex;
flex-direction:column;
justify-content:center;
padding:40px;
color:#fff;
position:relative;
overflow:hidden;
}

/* 3D SHAPE */
.left::before{
content:'';
position:absolute;
width:300px;
height:300px;
background:radial-gradient(circle,#fff5,#ff3d00);
border-radius:50%;
top:-50px;
left:-50px;
animation:spin 15s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.left h1{
font-size:42px;
z-index:2;
}

.left p{
font-size:14px;
opacity:.8;
margin-top:20px;
z-index:2;
}

/* RIGHT */
.right{
width:55%;
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
color:#fff;
}

/* TAB */
.tabs{
display:flex;
justify-content:space-between;
margin-bottom:30px;
}

.tabs span{
cursor:pointer;
position:relative;
}

.tabs span.active::after{
content:'';
position:absolute;
bottom:-5px;
left:0;
width:100%;
height:3px;
background:#fff;
}

/* INPUT */
.input-box{
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:12px 20px;
border-radius:30px;
border:none;
background:rgba(255,255,255,0.2);
color:#fff;
outline:none;
backdrop-filter:blur(10px);
}

/* BUTTON */
.btn{
margin-top:20px;
padding:12px;
border:none;
border-radius:30px;
background:#fff;
color:#ff3d00;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* CHECK */
.check{
display:flex;
align-items:center;
gap:10px;
font-size:12px;
margin-top:10px;
}

/* RESPONSIVE */
@media(max-width:768px){
.container{
flex-direction:column;
height:auto;
}
.left,.right{
width:100%;
}
}

</style>
</head>

<body>

<!-- FLOATING BALLS -->
<div class="ball"></div>
<div class="ball"></div>

<div class="container">

<!-- LEFT -->
<div class="left">
<h1>SIGN UP</h1>
<p>Modern glass UI with 3D animation effect.</p>
</div>

<!-- RIGHT -->
<div class="right">

<div class="tabs">
<span class="active">sign up</span>
<span>login</span>
</div>

<div class="input-box">
<input type="text" placeholder="name">
</div>

<div class="input-box">
<input type="text" placeholder="login">
</div>

<div class="input-box">
<input type="email" placeholder="e-mail">
</div>

<div class="input-box">
<input type="password" placeholder="password">
</div>

<div class="check">
<input type="checkbox"> I accept terms
</div>

<button class="btn">sign up →</button>

</div>

</div>

</body>
</html>
