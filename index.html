<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 AI Genius - Photo Editor + Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="ai-icon">🤖</span>
                <h1>AI Genius</h1>
            </div>
            <div class="status">
                <span class="status-light online"></span>
                <span>Online</span>
            </div>
        </header>

        <!-- Main Interface -->
        <div class="main-interface">
            <!-- Chat Section -->
            <div class="chat-section">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-container">
                    <input type="text" id="userInput" placeholder="আপনার কথা বলুন... (ফটো এডিট করতে চাইলে photo upload করুন)">
                    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                    <button id="voiceBtn"><i class="fas fa-microphone"></i></button>
                </div>
            </div>

            <!-- Photo Editor Section -->
            <div class="editor-section">
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <h3>Photo Upload করুন</h3>
                    <p>আপনার photo drag করুন বা click করুন</p>
                    <input type="file" id="photoInput" accept="image/*" multiple>
                </div>
                <div class="editor-tools" id="editorTools" style="display:none;">
                    <canvas id="editorCanvas"></canvas>
                    <div class="tool-buttons">
                        <button class="tool-btn active" data-tool="auto">🤖 Auto Magic</button>
                        <button class="tool-btn" data-tool="beauty">💄 Beauty</button>
                        <button class="tool-btn" data-tool="cartoon">🎨 Cartoon</button>
                        <button class="tool-btn" data-tool="hdr">🌅 HDR</button>
                        <button class="tool-btn" data-tool="vintage">📼 Vintage</button>
                        <button class="tool-btn" data-tool="neon">✨ Neon</button>
                    </div>
                    <div class="download-section">
                        <button id="downloadBtn" class="download-btn">💾 Download</button>
                        <button id="shareBtn" class="share-btn">📤 Share</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio Context for Voice -->
    <script>
        // Global variables
        let mediaRecorder;
        let audioChunks = [];
        let recognition;
    </script>
</body>
</html>
